<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Timer - Sport</title>
    <link rel="stylesheet" href="timer.css">
</head>
<body>
    <header>
        <h1>Orion Sport</h1>
    </header>
    <main>
        <div class="container">
            <h2>Timer</h2>
            <label for="timer-input">Nom du programme :</label>
            <input type="text" id="timer-input" placeholder="Entrez le nom du programme">
            
            <label for="duration-select">Durée :</label>
            <select id="duration-select">
                <option value="60">1 minute</option>
                <option value="120">2 minutes</option>
                <option value="300">5 minutes</option>
                <option value="600">10 minutes</option>
                <option value="900">15 minutes</option>
            </select>

            <button id="start-button">Lancer</button>
            
            <div id="display"></div>
        </div>
    </main>
    <footer>
        &copy; 2025 Orion Sport. Tous droits réservés.
    </footer>
    <script src="timer.js"></script>
</body>
</html>
